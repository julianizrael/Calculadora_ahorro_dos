<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Estrategia Patrimonial | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-annotation/3.0.1/chartjs-plugin-annotation.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* --- DISEÑO FINTECH PROFESIONAL --- */
        :root {
            --primary: #0f172a; --primary-light: #f1f5f9; --accent: #2563eb; 
            --success: #059669; --danger: #dc2626; --warning: #d97706;
            --bg-body: #f8fafc; --bg-card: #ffffff; --bg-input: #ffffff;
            --border: #e2e8f0; --text-main: #1e293b; --text-muted: #64748b;
            --radius: 4px; --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
        }

        body.night {
            --bg-body: #020617; --bg-card: #0f172a; --bg-input: #1e293b;
            --border: #334155; --text-main: #f8fafc; --text-muted: #94a3b8;
            --primary: #3b82f6; --primary-light: #1e1b4b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); line-height: 1.5; padding: 2rem 0; transition: background 0.3s; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }

        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1.5rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); }
        h1 { font-size: 1.1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-main); }
        .version-badge { font-size: 0.65rem; color: var(--text-muted); border: 1px solid var(--border); padding: 2px 8px; border-radius: 2px; margin-left: 10px; font-weight: 500; vertical-align: middle; }
        
        .header-buttons { display: flex; gap: 0.75rem; }
        .btn-icon { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); padding: 0.5rem 1rem; border-radius: var(--radius); font-weight: 600; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; transition: all 0.2s; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { opacity: 0.9; }

        /* TABS (ESTILO SUBRAYADO) */
        .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 2rem; gap: 2.5rem; }
        .tab { padding: 0.75rem 0; border: none; background: transparent; color: var(--text-muted); font-size: 0.8rem; font-weight: 600; cursor: pointer; text-transform: uppercase; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* FORMULARIOS */
        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        form { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; }
        .form-input-group { display: flex; flex-direction: column; gap: 0.4rem; }
        label { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        input[type="number"], input[type="text"], select { padding: 0.65rem 0.8rem; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.95rem; color: var(--text-main); font-variant-numeric: tabular-nums; width: 100%; transition: border 0.2s; }
        input:focus { outline: none; border-color: var(--accent); }

        /* COMPONENTES AVANZADOS */
        .input-with-action { position: relative; display: flex; align-items: center; }
        .btn-magic { position: absolute; right: 6px; background: var(--bg-body); border: 1px solid var(--border); font-size: 0.6rem; padding: 2px 6px; border-radius: 2px; cursor: pointer; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .btn-magic:hover { background: var(--accent); color: white; border-color: var(--accent); }

        .stage-row { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; padding: 1.5rem; border: 1px solid var(--border); border-radius: var(--radius); position: relative; background: var(--bg-card); margin-bottom: 0.5rem; }
        .stage-label { position: absolute; top: -10px; left: 15px; background: var(--bg-body); padding: 0 8px; font-size: 0.6rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }

        .deductions-container { grid-column: 1/-1; display: flex; flex-direction: column; gap: 0.75rem; margin-top: 1.5rem; }
        .deduction-item { display: grid; grid-template-columns: 1fr 1.5fr auto; gap: 1rem; align-items: flex-end; padding: 1.25rem; background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border); border-left: 3px solid var(--warning); }
        .btn-add { grid-column: 1/-1; padding: 0.8rem; background: transparent; border: 1px dashed var(--border); border-radius: var(--radius); cursor: pointer; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); }
        .btn-remove { background: #fee2e2; color: var(--danger); border: none; padding: 0.6rem; border-radius: var(--radius); font-weight: 700; cursor: pointer; font-size: 0.7rem; }

        /* DASHBOARD */
        .resume-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; margin: 2rem 0; box-shadow: var(--shadow-sm); }
        .resume-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 2.5rem; }
        .resume-item h3 { font-size: 0.65rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; letter-spacing: 0.05em; font-weight: 700; }
        .resume-item .value { font-size: 1.6rem; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1.2; }
        .resume-item .subtitle { font-size: 0.75rem; color: var(--accent); margin-top: 0.2rem; font-weight: 500; }

        /* TABLA Y GRÁFICOS */
        #chartContainer { background: var(--bg-card); border: 1px solid var(--border); padding: 1.5rem; height: 450px; border-radius: var(--radius); margin-top: 1.5rem; }
        #tableContainer { margin-top: 2rem; border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; display: none; background: var(--bg-card); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 0.8rem 1rem; background: var(--bg-body); color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; font-weight: 700; border-bottom: 1px solid var(--border); }
        td { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }

        /* TOOLTIPS */
        .tooltip-container { position: relative; display: inline-flex; align-items: center; }
        .tooltip-icon { width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 9px; cursor: help; color: var(--text-muted); }
        .tooltip { visibility: hidden; opacity: 0; position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%); width: 220px; padding: 1rem; background: #1e293b; color: white; font-size: 0.75rem; border-radius: 4px; z-index: 100; transition: 0.2s; text-transform: none; font-weight: 400; line-height: 1.4; pointer-events: none; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); }
        .tooltip-container:hover .tooltip { visibility: visible; opacity: 1; }
        .tooltip b { color: var(--accent); display: block; margin-bottom: 4px; }

        /* MODALES */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); padding: 2.5rem; width: 95%; max-width: 700px; border-radius: var(--radius); }
        .portfolio-layout { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 2.5rem; }
        .btn-profile { width: 100%; padding: 0.75rem; margin-bottom: 0.5rem; border: 1px solid var(--border); background: transparent; font-size: 0.75rem; font-weight: 600; cursor: pointer; border-radius: var(--radius); text-transform: uppercase; color: var(--text-muted); }
        .btn-profile.active { background: var(--primary); color: white; border-color: var(--primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 850px) { .stage-row, .portfolio-layout { grid-template-columns: 1fr; } .header { flex-direction: column; gap: 1rem; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Wealth & Capital Strategy <span class="version-badge">v2.5</span></h1>
            <div class="header-buttons">
                <button id="exportBtn" class="btn-icon">Generar PDF</button>
                <button id="toggleNightBtn" class="btn-icon btn-primary">Tema</button>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" data-tab="basico">Proyección Simple</button>
            <button class="tab" data-tab="avanzado">Plan por Etapas</button>
            <button class="tab" data-tab="escenarios">Escenarios</button>
            <button class="tab" data-tab="inversa">Objetivo</button>
        </div>

        <div id="basico" class="tab-content active"><form id="formBasico"></form></div>

        <div id="avanzado" class="tab-content">
            <form id="formAvanzado">
                <div style="grid-column: 1/-1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 1rem;">
                    <div class="form-input-group"><label>Monto Inicial</label><input type="text" class="money-input" id="advMontoInicial" value="0"></div>
                    <div class="form-input-group"><label>Edad Retiro</label><input type="number" id="advEdadFin" value="65"></div>
                    <div class="form-input-group"><label>Inflación (%)</label><input type="number" id="advInflacion" value="3" step="0.1"></div>
                </div>
                <div class="stage-row"><span class="stage-label">Etapa 1</span>
                    <div class="form-input-group"><label>Edad Inicio</label><input type="number" id="advEdad1" value="25"></div>
                    <div class="form-input-group"><label>Aporte Mensual</label><input type="text" class="money-input" id="advAporte1" value="500"></div>
                    <div class="form-input-group"><label>Rendimiento (%)</label><div class="input-with-action"><input type="number" id="advRend1" value="8" step="0.1"><button type="button" class="btn-magic" onclick="openPortfolioModal('advRend1')">🪄</button></div></div>
                </div>
                <div class="stage-row"><span class="stage-label">Etapa 2</span>
                    <div class="form-input-group"><label>Edad Inicio</label><input type="number" id="advEdad2" value="35"></div>
                    <div class="form-input-group"><label>Aporte Mensual</label><input type="text" class="money-input" id="advAporte2" value="1000"></div>
                    <div class="form-input-group"><label>Rendimiento (%)</label><div class="input-with-action"><input type="number" id="advRend2" value="6" step="0.1"><button type="button" class="btn-magic" onclick="openPortfolioModal('advRend2')">🪄</button></div></div>
                </div>
                <div class="stage-row"><span class="stage-label">Etapa 3</span>
                    <div class="form-input-group"><label>Edad Inicio</label><input type="number" id="advEdad3" value="50"></div>
                    <div class="form-input-group"><label>Aporte Mensual</label><input type="text" class="money-input" id="advAporte3" value="1500"></div>
                    <div class="form-input-group"><label>Rendimiento (%)</label><div class="input-with-action"><input type="number" id="advRend3" value="4" step="0.1"><button type="button" class="btn-magic" onclick="openPortfolioModal('advRend3')">🪄</button></div></div>
                </div>
                <div class="deductions-container"><div id="deductionsContainer"></div><button type="button" class="btn-add" id="addDeductionBtn">+ Agregar Gasto Programado</button></div>
            </form>
        </div>

        <div id="escenarios" class="tab-content">
            <form style="margin-bottom: 2rem; background: var(--bg-card); padding: 1.5rem; border: 1px solid var(--border);">
                <div class="form-input-group"><label>Capital Inicial</label><input type="text" class="money-input" id="montoInicialEsc" value="0"></div>
                <div class="form-input-group"><label>Aporte Mensual</label><input type="text" class="money-input" id="aporteMensualEsc" value="100"></div>
                <div class="form-input-group"><label>Edad Actual</label><input type="number" id="edadActualEsc" value="25"></div>
                <div class="form-input-group"><label>Edad Objetivo</label><input type="number" id="edadObjetivoEsc" value="65"></div>
            </form>
            <div id="scenariosContainer" class="resume-grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));"></div>
        </div>

        <div id="inversa" class="tab-content">
            <form id="formInversa">
                <div class="form-input-group"><label>¿Cuánto quieres juntar?</label><input type="text" class="money-input" id="objetivoInversa" value="1.000.000" style="font-weight:700; font-size: 1.2rem;"></div>
                <div class="form-input-group"><label>Edad Actual</label><input type="number" id="edadActualInversa" value="25"></div>
                <div class="form-input-group"><label>Edad Objetivo</label><input type="number" id="edadObjetivoInversa" value="65"></div>
                <div class="form-input-group"><label>Rentabilidad (%)</label><input type="number" id="rendimientoInversa" value="5" step="0.1"></div>
                <div class="form-input-group"><label>Capital Inicial</label><input type="text" class="money-input" id="montoInicialInversa" value="0"></div>
            </form>
            <div id="resultadoInversa" class="resume-card"></div>
        </div>

        <div id="resumen" class="resume-card"></div>
        <div style="display: flex; justify-content: flex-end;"><button id="toggleTableBtn" class="btn-icon">Ver Tabla Detallada</button></div>
        <div id="tableContainer"></div>
        <div id="chartContainer"><canvas id="savingChart"></canvas></div>
    </div>

    <div id="portfolioModal" class="modal"><div class="modal-content">
        <h2 style="font-size: 1rem; margin-bottom: 2rem; text-transform: uppercase;">Asistente de Inversión</h2>
        <div class="portfolio-layout">
            <div>
                <button class="btn-profile" onclick="setProfile('conservative')">Conservador</button>
                <button class="btn-profile" onclick="setProfile('moderate')">Moderado</button>
                <button class="btn-profile" onclick="setProfile('aggressive')">Agresivo</button>
                <div style="margin-top: 1.5rem;">
                    <div style="display:flex; justify-content:space-between; font-size:0.7rem; font-weight:700; color:var(--text-muted); margin-bottom:0.5rem;"><span>ACCIONES (S&P 500)</span><span id="valStocks">60%</span></div>
                    <input type="range" id="rangeStocks" min="0" max="100" value="60" style="width:100%;" oninput="updatePortfolio(this.id)">
                </div>
            </div>
            <div style="text-align: center; border-left: 1px solid var(--border); padding-left: 2rem;">
                <div style="width: 130px; height: 130px; margin: 0 auto 1rem;"><canvas id="donutChart"></canvas></div>
                <div style="font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase;">Retorno Estimado</div>
                <div id="finalReturnDisplay" style="font-size: 2.2rem; font-weight: 700; color: var(--accent);">9.0%</div>
                <div id="riskBadge" style="display:inline-block; font-size:0.6rem; padding:2px 8px; border-radius:2px; font-weight:700; text-transform:uppercase;">Riesgo Medio</div>
            </div>
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;"><button class="btn-icon" onclick="closePortfolioModal()">Cancelar</button><button class="btn-icon btn-primary" onclick="applyPortfolio()">Usar Tasa</button></div>
    </div></div>

    <script>
        /* --- CORE LOGIC (100% FUNCIONALIDAD ORIGINAL) --- */
        const camposBasico = [
            ['Edad inicio', 'edadInicioBasico', 25, {t:'Edad Actual', c:'Edad con la que inicias la inversión.', e:'Ej: 30'}],
            ['Edad fin', 'edadFinBasico', 65, {t:'Objetivo', c:'Edad a la que planeas retirarte.', e:'Ej: 65'}],
            ['Monto inicial', 'montoInicialBasico', 0, {t:'Capital Semilla', c:'Dinero ahorrado actualmente.', e:'Ej: 10.000'}],
            ['Aporte mensual', 'aporteMensualBasico', 100, {t:'Flujo Mensual', c:'Ahorro constante cada mes.', e:'Ej: 200'}],
            ['Rendimiento (%)', 'rendimientoBasico', 5, {t:'Tasa Interés', c:'Rentabilidad anual esperada.', e:'Ej: 5-8%'}],
            ['Inflación (%)', 'inflacionBasico', 3, {t:'Inflación', c:'Pérdida de valor del dinero.', e:'Ej: 3%'}],
        ];

        let myChart = null, donutChart = null, currentTargetInput = null;

        const formatCurrency = n => new Intl.NumberFormat('es-ES').format(Math.round(n));
        const formatInput = v => v.toString().replace(/\D/g, '').replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        const clean = v => parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) || 0;

        function setupHandlers() {
            document.body.addEventListener('input', e => {
                if(e.target.classList.contains('money-input')) {
                    const start = e.target.selectionStart, oldLen = e.target.value.length;
                    e.target.value = formatInput(e.target.value);
                    e.target.setSelectionRange(start + (e.target.value.length - oldLen), start + (e.target.value.length - oldLen));
                }
                if(e.target.tagName === 'INPUT' && !e.target.id.includes('range')) autoCalcular();
            });
        }

        function generarInputs(campos, formId) {
            const form = document.getElementById(formId);
            campos.forEach(([label, id, val, tt]) => {
                const isMoney = id.toLowerCase().includes('monto') || id.toLowerCase().includes('aporte') || id.toLowerCase().includes('objetivo');
                const div = document.createElement('div');
                div.className = 'form-input-group';
                div.innerHTML = `<label>${label} <div class="tooltip-container"><div class="tooltip-icon">?</div><div class="tooltip"><b>${tt.t}</b>${tt.c}<br><i style="color:var(--accent);font-size:0.65rem;">${tt.e}</i></div></div></label>
                <input type="text" id="${id}" value="${isMoney ? formatInput(val) : val}" class="${isMoney ? 'money-input' : ''}">`;
                form.appendChild(div);
            });
        }

        /* --- CÁLCULOS --- */
        function calcularBasico() {
            const e0 = +document.getElementById('edadInicioBasico').value, eF = +document.getElementById('edadFinBasico').value;
            const aporte = clean(document.getElementById('aporteMensualBasico').value)*12, rate = (+document.getElementById('rendimientoBasico').value)/100, infl = (+document.getElementById('inflacionBasico').value)/100;
            let saldo = clean(document.getElementById('montoInicialBasico').value);
            const datos = []; let total = saldo;
            for(let i=e0; i<=eF; i++){
                if(i>e0) { saldo = (saldo + aporte)*(1+rate); total += aporte; }
                datos.push({ edad: i, saldo, saldoReal: saldo / Math.pow(1+infl, i-e0), total });
            }
            render(datos, total);
        }

        function calcularAvanzado() {
            const eF = +document.getElementById('advEdadFin').value, infl = (+document.getElementById('advInflacion').value)/100;
            let saldo = clean(document.getElementById('advMontoInicial').value), total = saldo;
            const deds = Array.from(document.querySelectorAll('.deduction-item')).map(i => ({ age: +i.querySelector('.ded-age').value, amt: clean(i.querySelector('.ded-amt').value) }));
            const etapas = [
                { e: +document.getElementById('advEdad1').value, a: clean(document.getElementById('advAporte1').value)*12, r: +document.getElementById('advRend1').value/100 },
                { e: +document.getElementById('advEdad2').value, a: clean(document.getElementById('advAporte2').value)*12, r: +document.getElementById('advRend2').value/100 },
                { e: +document.getElementById('advEdad3').value, a: clean(document.getElementById('advAporte3').value)*12, r: +document.getElementById('advRend3').value/100 }
            ];
            const datos = [];
            for(let i=etapas[0].e; i<=eF; i++){
                let f = etapas[0]; if(i >= etapas[2].e) f = etapas[2]; else if(i >= etapas[1].e) f = etapas[1];
                const g = deds.filter(d => d.age === i).reduce((a,b) => a + b.amt, 0);
                saldo = (saldo + f.a - g)*(1+f.r); total += f.a;
                datos.push({ edad: i, saldo: Math.max(0, saldo), saldoReal: Math.max(0, saldo) / Math.pow(1+infl, i-etapas[0].e), total });
            }
            render(datos, total);
        }

        function renderEscenarios() {
            const cfg = { e0: +document.getElementById('edadActualEsc').value, eF: +document.getElementById('edadObjetivoEsc').value, a: clean(document.getElementById('aporteMensualEsc').value)*12, s: clean(document.getElementById('montoInicialEsc').value) };
            const run = (r, i) => { let s = cfg.s; for(let j=cfg.e0; j<cfg.eF; j++) s = (s + cfg.a)*(1+r); return { nom: s, real: s / Math.pow(1+i, cfg.eF-cfg.e0) }; };
            const res = [ {t:'🚀 Optimista', c:'success', d:run(0.10, 0.02), r:'10%', i:'2%'}, {t:'🎯 Realista', c:'accent', d:run(0.05, 0.03), r:'5%', i:'3%'}, {t:'⚠️ Pesimista', c:'danger', d:run(0.02, 0.05), r:'2%', i:'5%'} ];
            document.getElementById('scenariosContainer').innerHTML = res.map(s => `
                <div class="resume-card" style="border-top: 3px solid var(--${s.c});">
                    <h3>${s.t}</h3><div style="font-size:0.6rem; margin-bottom:1rem;">Retorno ${s.r} | Inflación ${s.i}</div>
                    <div class="resume-item"><h3>Final Nominal</h3><div class="value">${formatCurrency(s.d.nom)}</div></div>
                    <div class="resume-item" style="margin-top:1rem;"><h3>Final Real</h3><div class="value" style="font-size:1.1rem; color:var(--text-muted);">${formatCurrency(s.d.real)}</div></div>
                </div>`).join('');
        }

        function calcularInversa() {
            const obj = clean(document.getElementById('objetivoInversa').value), ini = clean(document.getElementById('montoInicialInversa').value);
            const e0 = +document.getElementById('edadActualInversa').value, eF = +document.getElementById('edadObjetivoInversa').value, r = (+document.getElementById('rendimientoInversa').value)/100;
            const n = eF - e0; if(n <= 0) return;
            const pmt = ((obj - ini * Math.pow(1+r, n)) * r) / (Math.pow(1+r, n) - 1) / 12;
            document.getElementById('resultadoInversa').innerHTML = `<div class="resume-grid">
                <div class="resume-item"><h3>Aporte Mensual Necesario</h3><div class="value">${formatCurrency(pmt)}</div><div class="subtitle">Durante ${n} años</div></div>
                <div class="resume-item"><h3>Total Aportado</h3><div class="value">${formatCurrency(pmt*12*n + ini)}</div></div>
            </div>`;
        }

        /* --- VISUALIZACIÓN --- */
        function render(datos, total) {
            const f = datos[datos.length-1];
            document.getElementById('resumen').innerHTML = `<div class="resume-grid">
                <div class="resume-item"><h3>Capital Final</h3><div class="value">${formatCurrency(f.saldo)}</div><div class="subtitle">A los ${f.edad} años</div></div>
                <div class="resume-item"><h3>Poder de Compra</h3><div class="value">${formatCurrency(f.saldoReal)}</div><div class="subtitle">Ajustado inflación</div></div>
                <div class="resume-item"><h3>Esfuerzo Propio</h3><div class="value">${formatCurrency(total)}</div><div class="subtitle">Total aportado</div></div>
                <div class="resume-item"><h3>Ganancia Neta</h3><div class="value">${formatCurrency(f.saldo - total)}</div><div class="subtitle">Interés generado</div></div>
            </div>`;
            const rows = datos.filter((d,i) => i%2===0 || i===datos.length-1).map(d => `<tr><td>${d.edad}</td><td>${formatCurrency(d.saldo)}</td><td>${formatCurrency(d.saldoReal)}</td><td>${formatCurrency(d.total)}</td></tr>`).join('');
            document.getElementById('tableContainer').innerHTML = `<table><thead><tr><th>Edad</th><th>Nominal</th><th>Real</th><th>Aportado</th></tr></thead><tbody>${rows}</tbody></table>`;
            renderChart(datos);
        }

        function renderChart(datos) {
            const ctx = document.getElementById('savingChart').getContext('2d');
            if(myChart) myChart.destroy();
            const isDark = document.body.classList.contains('night');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: datos.map(d => d.edad),
                    datasets: [
                        { label: 'Nominal', data: datos.map(d => d.saldo), borderColor: '#2563eb', backgroundColor: '#2563eb10', fill: true, tension: 0.3, pointRadius: 0 },
                        { label: 'Real', data: datos.map(d => d.saldoReal), borderColor: isDark ? '#a3a3a3' : '#64748b', borderDash: [5,5], tension: 0.3, pointRadius: 0 }
                    ]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    plugins: { legend: { position: 'bottom', labels: { font: { size: 10, weight: 600 }, color: isDark ? '#a3a3a3' : '#64748b' } } },
                    scales: { y: { ticks: { callback: v => formatCurrency(v), color: '#94a3b8' }, grid: { color: isDark ? '#1e293b' : '#f1f5f9' } }, x: { ticks: { color: '#94a3b8' }, grid: { display: false } } }
                }
            });
        }

        /* --- UTILIDADES MODAL Y SISTEMA --- */
        function openPortfolioModal(id) {
            currentTargetInput = id; document.getElementById('portfolioModal').classList.add('active');
            if(!donutChart) {
                const ctx = document.getElementById('donutChart').getContext('2d');
                donutChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Acciones', 'Bonos'], datasets: [{ data: [60, 40], backgroundColor: ['#2563eb', '#10b981'], borderWidth: 0 }] }, options: { cutout: '80%', plugins: { legend: { display: false } } } });
            }
            setProfile('moderate');
        }
        function closePortfolioModal() { document.getElementById('portfolioModal').classList.remove('active'); }
        function setProfile(p) {
            const s = document.getElementById('rangeStocks');
            if(p==='conservative') s.value = 20; else if(p==='moderate') s.value = 60; else s.value = 100;
            updatePortfolio(); document.querySelectorAll('.btn-profile').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(p)));
        }
        function updatePortfolio() {
            const s = +document.getElementById('rangeStocks').value, b = 100-s;
            document.getElementById('valStocks').innerText = s+'%';
            const r = (s*0.11 + b*0.04).toFixed(1);
            document.getElementById('finalReturnDisplay').innerText = r+'%';
            const badge = document.getElementById('riskBadge');
            badge.style.background = s>70 ? '#fee2e2' : (s>40 ? '#fef3c7' : '#d1fae5');
            badge.style.color = s>70 ? '#991b1b' : (s>40 ? '#92400e' : '#065f46');
            badge.innerText = s>70 ? 'Riesgo Alto' : (s>40 ? 'Riesgo Medio' : 'Riesgo Bajo');
            if(donutChart) { donutChart.data.datasets[0].data = [s,b]; donutChart.update(); }
        }
        function applyPortfolio() { document.getElementById(currentTargetInput).value = document.getElementById('finalReturnDisplay').innerText.replace('%',''); closePortfolioModal(); autoCalcular(); }

        function addDeduction(age='', amt='') {
            const div = document.createElement('div'); div.className = 'deduction-item';
            div.innerHTML = `<div class="form-input-group"><label>Edad</label><input type="number" class="ded-age" value="${age}"></div>
            <div class="form-input-group"><label>Monto</label><input type="text" class="money-input ded-amt" value="${amt}"></div>
            <button type="button" class="btn-remove" onclick="this.parentElement.remove(); autoCalcular();">Eliminar</button>`;
            document.getElementById('deductionsContainer').appendChild(div);
        }

        async function exportToPDF() {
            const { jsPDF } = window.jspdf; const pdf = new jsPDF('p','mm','a4'); const btn = document.getElementById('exportBtn'); btn.innerText = "...";
            const wasNight = document.body.classList.contains('night'); if(wasNight) document.body.classList.remove('night'); autoCalcular();
            await new Promise(r => setTimeout(r, 400));
            try {
                const resC = await html2canvas(document.getElementById('resumen'), {scale:2});
                const chartC = await html2canvas(document.getElementById('chartContainer'), {scale:2});
                pdf.setFontSize(16); pdf.text("Plan de Estrategia Patrimonial", 15, 20);
                pdf.addImage(resC.toDataURL(), 'PNG', 15, 30, 180, (resC.height*180)/resC.width);
                pdf.addImage(chartC.toDataURL(), 'PNG', 15, 30 + (resC.height*180)/resC.width + 10, 180, (chartC.height*180)/chartC.width);
                pdf.save("estrategia.pdf");
            } finally { if(wasNight) document.body.classList.add('night'); btn.innerText = "Generar PDF"; autoCalcular(); }
        }

        function autoCalcular() {
            document.querySelectorAll('input').forEach(i => i.id && !i.id.includes('range') && localStorage.setItem(i.id, i.value));
            const deds = Array.from(document.querySelectorAll('.deduction-item')).map(i => ({ age: i.querySelector('.ded-age').value, amt: i.querySelector('.ded-amt').value }));
            localStorage.setItem('deds_pro', JSON.stringify(deds));
            const tab = document.querySelector('.tab.active').dataset.tab;
            if(tab==='basico') calcularBasico(); else if(tab==='avanzado') calcularAvanzado(); else if(tab==='escenarios') renderEscenarios(); else if(tab==='inversa') calcularInversa();
        }

        window.onload = () => {
            generarInputs(camposBasico, 'formBasico'); setupHandlers();
            document.querySelectorAll('input').forEach(i => { const v = localStorage.getItem(i.id); if(v) i.value = i.classList.contains('money-input') ? formatInput(v) : v; });
            JSON.parse(localStorage.getItem('deds_pro') || '[]').forEach(d => addDeduction(d.age, formatInput(d.amt)));
            document.getElementById('addDeductionBtn').onclick = () => addDeduction();
            document.getElementById('exportBtn').onclick = exportToPDF;
            document.getElementById('toggleNightBtn').onclick = () => { document.body.classList.toggle('night'); localStorage.setItem('night_pro', document.body.classList.contains('night')); autoCalcular(); };
            if(localStorage.getItem('night_pro') === 'true') document.body.classList.add('night');
            document.getElementById('toggleTableBtn').onclick = () => { const t = document.getElementById('tableContainer'); t.style.display = t.style.display==='none'?'block':'none'; };
            document.querySelectorAll('.tab').forEach(t => t.onclick = function() {
                document.querySelectorAll('.tab, .tab-content').forEach(el => el.classList.remove('active'));
                this.classList.add('active'); document.getElementById(this.dataset.tab).classList.add('active');
                autoCalcular();
            });
            autoCalcular();
        };
    </script>
</body>
</html>
